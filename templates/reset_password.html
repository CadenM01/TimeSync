<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TimeSync -- Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #09090b;
  --bg-card: #18181b;
  --bg-input: #27272a;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #52525b;
  --border: #27272a;
  --border-strong: #3f3f46;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --green-neon: #00ff88;
  --red: #ef4444;
}
body {
  font-family: 'Geist', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
  padding: 24px;
}
.card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 32px;
}
h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.sub { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
.group { margin-bottom: 16px; }
label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
input {
  width: 100%; padding: 11px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  color: var(--text);
  font: 500 14px 'Geist', sans-serif;
}
input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
button {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: 0;
  border-radius: 8px;
  font: 600 14px 'Geist', sans-serif;
  cursor: pointer;
  margin-top: 8px;
}
button:hover { background: var(--accent-hover); }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.status { margin-top: 14px; font-size: 13px; color: var(--red); min-height: 18px; }
.status.ok { color: var(--green-neon); }
a.back { display: inline-block; margin-top: 18px; font-size: 13px; color: var(--text-secondary); text-decoration: none; }
a.back:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="card">
  <h1>Choose a new password</h1>
  <p class="sub">Enter a new password for your TimeSync account.</p>
  <div class="group">
    <label for="new-password">New password</label>
    <input id="new-password" type="password" placeholder="Min 6 characters" autocomplete="new-password" />
  </div>
  <div class="group">
    <label for="confirm-password">Confirm password</label>
    <input id="confirm-password" type="password" placeholder="Confirm password" autocomplete="new-password" />
  </div>
  <button id="reset-btn" type="button">Update password</button>
  <div class="status" id="status"></div>
  <a class="back" href="/login">Back to sign in</a>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token') || '';
  var statusEl = document.getElementById('status');
  function setStatus(msg, ok) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (ok ? ' ok' : '');
  }
  if (!token) {
    setStatus('Reset link is missing or invalid.', false);
    document.getElementById('reset-btn').disabled = true;
    return;
  }
  document.getElementById('reset-btn').addEventListener('click', function() {
    var btn = this;
    var pw = document.getElementById('new-password').value;
    var confirm = document.getElementById('confirm-password').value;
    if (pw.length < 6) { setStatus('Password must be at least 6 characters.', false); return; }
    if (pw !== confirm) { setStatus('Passwords do not match.', false); return; }
    btn.textContent = 'Updating...'; btn.disabled = true;
    fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: pw })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        setStatus(data.message || 'Password updated. Redirecting to sign in...', true);
        setTimeout(function() { window.location.href = '/login'; }, 1500);
      } else {
        setStatus(data.error || 'Reset failed.', false);
        btn.textContent = 'Update password'; btn.disabled = false;
      }
    })
    .catch(function() {
      setStatus('Network error. Please try again.', false);
      btn.textContent = 'Update password'; btn.disabled = false;
    });
  });
})();
</script>
</body>
</html>
